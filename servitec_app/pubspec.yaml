name: servitec_app
description: "Home Service Marketplace App - Connecting customers with home service technicians"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  iconsax_flutter: ^1.0.0

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Navigation
  go_router: ^15.1.2

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  firebase_messaging: ^15.2.4

  # Maps & Location
  google_maps_flutter: ^2.12.1
  geolocator: ^14.0.0
  geocoding: ^3.0.0

  # Image
  image_picker: ^1.1.2
  image_cropper: ^9.0.0
  flutter_image_compress: ^2.3.0
  uuid: ^4.5.1

  # Payments
  flutter_stripe: ^11.4.0
  http: ^1.3.0

  # Charts
  fl_chart: ^0.70.2

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.3.1
  permission_handler: ^12.0.0
  flutter_local_notifications: ^19.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
